name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint -- --max-warnings=0

      - name: Build
        run: pnpm run build
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
          WARCRAFT_LOGS_CLIENT_ID: ${{ secrets.WARCRAFT_LOGS_CLIENT_ID }}
          WARCRAFT_LOGS_CLIENT_SECRET: ${{ secrets.WARCRAFT_LOGS_CLIENT_SECRET }}
