name: Tag Release

on:
  push:
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version from latest tag
        id: version
        run: |
          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)

          if [ -z "$latest" ]; then
            latest="v$(jq -r .version package.json)"
          fi

          major=$(echo "$latest" | tr -d 'v' | cut -d. -f1)
          minor=$(echo "$latest" | tr -d 'v' | cut -d. -f2)
          patch=$(echo "$latest" | tr -d 'v' | cut -d. -f3)

          patch=$((patch + 1))
          if [ "$patch" -ge 10 ]; then
            patch=0
            minor=$((minor + 1))
          fi

          next="v${major}.${minor}.${patch}"
          echo "value=${next}" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.value }}
          git push origin ${{ steps.version.outputs.value }}
