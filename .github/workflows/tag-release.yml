name: Tag Release

on:
  push:
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version and write to package.json
        id: version
        run: |
          current=$(jq -r .version package.json)
          major=$(echo "$current" | cut -d. -f1)
          minor=$(echo "$current" | cut -d. -f2)
          patch=$(echo "$current" | cut -d. -f3)

          patch=$((patch + 1))
          if [ "$patch" -ge 10 ]; then
            patch=0
            minor=$((minor + 1))
          fi

          next="${major}.${minor}.${patch}"
          jq --arg v "$next" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          echo "value=v${next}" >> $GITHUB_OUTPUT

      - name: Commit bumped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.value }}"
          git push origin main

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.value }}
          git push origin ${{ steps.version.outputs.value }}
